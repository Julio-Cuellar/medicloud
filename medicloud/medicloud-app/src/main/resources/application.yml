spring:
  application:
    name: medicloud-application
  datasource:
    url: jdbc:postgresql://localhost:5432/medicloud
    username: postgres
    password: root
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        hbm2ddl:
          create_namespaces: true
  servlet:
    multipart:
      enabled: true
      max-file-size: 10MB
      max-request-size: 10MB

app:
  file-upload:
    directory: ./uploads

server:
  port: 8082

logging:
  level:
    org.springframework.security: DEBUG
    org.springframework.web: DEBUG

