spring:
  application:
    name: medicloud-application
  datasource:
    url: jdbc:postgresql://localhost:5432/medicloud
    username: postgres
    password: root
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        hbm2ddl:
          create_namespaces: true

server:
  port: 8082

logging:
  level:
    org.springframework.security: DEBUG
    org.springframework.web: DEBUG

